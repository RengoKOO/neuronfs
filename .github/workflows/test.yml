name: NeuronFS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        working-directory: ./runtime
        run: go build -ldflags="-s -w" -trimpath -buildvcs=false -o ../neuronfs .

      - name: Test
        working-directory: ./runtime
        run: go test -v -buildvcs=false ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Vet
        working-directory: ./runtime
        run: go vet ./...
